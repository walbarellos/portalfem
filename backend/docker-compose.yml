version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fem_directus}
      POSTGRES_USER: ${DB_USER:-fem_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backups:/backups
    networks:
      - fem-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fem_admin} -d ${DB_DATABASE:-fem_directus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fem-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - fem-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.17.4
    container_name: fem-directus
    restart: unless-stopped
    ports:
      - "127.0.0.1:8055:8055"
    environment:
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-fem_directus}
      DB_USER: ${DB_USER:-fem_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS: redis://:${REDIS_PASSWORD}@redis:6379
      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: redis
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8055}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://femcultura.ac.gov.br,http://localhost:4321,http://localhost:3000,http://localhost:8055}"
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /directus/uploads
      FILES_MAX_UPLOAD_SIZE: ${FILES_MAX_UPLOAD_SIZE:-100mb}
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: redis
      RATE_LIMITER_POINTS: 10000
      RATE_LIMITER_DURATION: 60
      TZ: America/Rio_Branco
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
      - ./snapshots:/directus/snapshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8055/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fem-network

networks:
  fem-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  directus_uploads:
  directus_extensions:
